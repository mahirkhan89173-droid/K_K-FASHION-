<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K_K Fashion — Online Clothing Store</title>

  <meta name="google-adsense-account" content="ca-pub-4612907862422691">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4612907862422691" crossorigin="anonymous"></script>

  <meta name="description" content="Shop t-shirts, shirts, pants and combos online. Easy ordering on WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-08325P1W4G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-08325P1W4G');
  </script>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash" class="splash">
    <div class="splash-glow"></div>
    <div class="splash-oval">
      <div class="splash-brand">K_K</div>
      <div class="splash-sub">FASHION</div>
    </div>
    <div class="splash-line"></div>
    <p class="splash-tagline">Premium Quality</p>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">

    <!-- HEADER -->
    <header class="header">
      <button id="logoBtn" class="logo-btn" aria-label="Store logo">
        <span class="brand-mark">K_K</span>
        <span class="brand-name">Fashion</span>
      </button>
      <button id="cartBtn" class="icon-btn cart-btn" aria-label="Open cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span id="cartCount" class="badge hidden">0</span>
      </button>
    </header>

    <!-- MAIN CATEGORY BAR (GEN-Z PREMIUM | OTHER) -->
    <div class="main-cats-wrap">
      <div class="main-cats">
        <button id="btnGenz" class="main-cat-btn active" onclick="selectMainCat('GENZ')">
          <span class="mc-label">GEN-Z PREMIUM</span>
          <span class="mc-tag">✦ New</span>
        </button>
        <button id="btnOther" class="main-cat-btn" onclick="selectMainCat('OTHER')">
          <span class="mc-label">OTHER</span>
        </button>
      </div>
    </div>

    <!-- SUB-CATEGORY BAR (Only shown for GEN-Z PREMIUM) -->
    <div id="subCatsWrap" class="sub-cats-wrap">
      <div id="subCats" class="cats"></div>
    </div>

    <!-- PRODUCT SECTION -->
    <main class="main">
      <h2 id="activeTitle" class="section-title">GEN-Z PREMIUM</h2>
      <div id="products" class="grid"></div>
    </main>
  </div>

  <!-- CART DRAWER -->
  <div id="cartOverlay" class="overlay hidden">
    <div class="drawer">
      <div class="drawer-head">
        <h2>Your Cart</h2>
        <button id="cartClose" class="icon-btn" aria-label="Close cart">✕</button>
      </div>
      <div id="cartItems" class="drawer-body"></div>
      <div id="cartFooter" class="drawer-foot hidden">
        <div class="total"><span>Total</span><span id="cartTotal">₹0</span></div>
        <button id="checkoutBtn" class="btn-primary full">Order on WhatsApp</button>
        <button id="clearCartBtn" class="link">Clear cart</button>
      </div>
    </div>
  </div>

  <!-- ADMIN PIN MODAL -->
  <div id="adminPin" class="overlay center hidden">
    <div class="pin-box">
      <button id="pinClose" class="icon-btn close-abs" aria-label="Close">✕</button>
      <div class="lock">🔒</div>
      <h2>Admin Login</h2>
      <p>Enter PIN to continue</p>
      <input id="pinInput" type="password" inputmode="numeric" placeholder="••••" class="pin-input" />
      <div id="pinError" class="error hidden">Wrong PIN</div>
      <button id="pinUnlock" class="btn-primary full">Unlock</button>
    </div>
  </div>

  <!-- EDIT PRODUCT MODAL -->
  <div id="editModal" class="overlay center hidden">
    <div class="pin-box wide-box">
      <button id="editClose" class="icon-btn close-abs" aria-label="Close">✕</button>
      <h2>Edit Product</h2>
      <p id="editPName" class="edit-prod-name"></p>
      <div class="row3" style="margin-bottom:12px;">
        <div class="field-group">
          <label class="field-label">Actual Price (₹)</label>
          <input id="editPPrice" class="field" type="number" placeholder="Price" />
        </div>
        <div class="field-group">
          <label class="field-label">Discount %</label>
          <input id="editPDiscount" class="field" type="number" placeholder="Discount %" />
        </div>
        <div class="field-group">
          <label class="field-label">Extra Charge (₹)</label>
          <input id="editPExtra" class="field" type="number" placeholder="Extra ₹" />
        </div>
      </div>
      <div class="stock-toggle-row">
        <span class="field-label">Stock Status</span>
        <label class="toggle-switch">
          <input type="checkbox" id="editInStock" checked />
          <span class="toggle-slider"></span>
        </label>
        <span id="editStockLabel" class="stock-label in">In Stock</span>
      </div>
      <button id="saveEditBtn" class="btn-primary full" style="margin-top:16px;">Save Changes</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin hidden">
    <div class="admin-inner">
      <div class="drawer-head">
        <h2>Admin Panel</h2>
        <button id="adminClose" class="icon-btn" aria-label="Close admin">✕</button>
      </div>

      <!-- SUB-CATEGORY MANAGEMENT -->
      <section class="card">
        <h3>Sub-Category Management</h3>
        <p class="section-hint">These sub-categories appear under <strong>GEN-Z PREMIUM</strong></p>
        <div id="adminSubCats" class="chips"></div>
        <div class="row">
          <input id="newSubCat" class="field" placeholder="New sub-category (e.g. PUMA COMBO)" />
          <button id="addSubCatBtn" class="btn-primary">+ Add</button>
        </div>
      </section>

      <!-- ADD PRODUCT -->
      <section class="card">
        <h3>Add Product</h3>
        <input id="pName" class="field" placeholder="Product name" />
        <input id="pImage" class="field" placeholder="Image URL" />
        <div class="row3" style="margin-bottom:12px;">
          <div class="field-group">
            <label class="field-label">Actual Price (₹)</label>
            <input id="pPrice" class="field" type="number" placeholder="Price" />
          </div>
          <div class="field-group">
            <label class="field-label">Discount %</label>
            <input id="pDiscount" class="field" type="number" placeholder="Discount %" />
          </div>
          <div class="field-group">
            <label class="field-label">Extra Charge (₹)</label>
            <input id="pExtra" class="field" type="number" placeholder="Extra ₹" />
          </div>
        </div>
        <div class="row2" style="margin-bottom:12px;">
          <div class="field-group">
            <label class="field-label">Main Category</label>
            <select id="pMainCat" class="field" onchange="onMainCatChange()">
              <option value="GENZ">GEN-Z PREMIUM</option>
              <option value="OTHER">OTHER</option>
            </select>
          </div>
          <div class="field-group" id="subCatGroup">
            <label class="field-label">Sub-Category</label>
            <select id="pSubCat" class="field"></select>
          </div>
        </div>
        <div class="stock-toggle-row" style="margin-bottom:14px;">
          <span class="field-label">Stock Status</span>
          <label class="toggle-switch">
            <input type="checkbox" id="pInStock" checked />
            <span class="toggle-slider"></span>
          </label>
          <span id="pStockLabel" class="stock-label in">In Stock</span>
        </div>
        <button id="addProductBtn" class="btn-primary full">Add Product</button>
      </section>

      <!-- PRODUCTS LIST -->
      <section class="card">
        <h3 id="adminProdTitle">Products</h3>
        <div class="admin-filter-row">
          <select id="adminFilterMain" class="field small-field" onchange="renderAdmin()">
            <option value="ALL">All Categories</option>
            <option value="GENZ">GEN-Z PREMIUM</option>
            <option value="OTHER">OTHER</option>
          </select>
        </div>
        <div id="adminProducts"></div>
      </section>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, getDoc, setDoc, updateDoc }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXCtwKT6klj3xcZfTBkOIg8YACa_OgWwo",
      authDomain: "kkfashion-aaa22.firebaseapp.com",
      projectId: "kkfashion-aaa22",
      storageBucket: "kkfashion-aaa22.firebasestorage.app",
      messagingSenderId: "236160837133",
      appId: "1:236160837133:web:531d73323c958f68849744",
      measurementId: "G-MFZ80TQVKT"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    async function fetchProducts() {
      try {
        const querySnapshot = await getDocs(collection(db, "products"));
        const fbProducts = [];
        querySnapshot.forEach((d) => {
          const data = d.data();
          fbProducts.push({
            id: d.id,
            name: data.name,
            image: data.imageUrl,
            price: data.price,
            discount: data.discount || 0,
            extra: data.extra || 0,
            mainCategory: data.mainCategory || "GENZ",
            subCategory: data.subCategory || data.category || "",
            inStock: data.inStock !== false
          });
        });
        if (window.updateProductsFromFirebase) window.updateProductsFromFirebase(fbProducts);
      } catch (error) {
        console.error("Error fetching products:", error);
      }
    }

    async function fetchSettings() {
      try {
        const catDoc = await getDoc(doc(db, "settings", "storeData"));
        if (catDoc.exists()) {
          const data = catDoc.data();
          const subCats = data.subCategories || data.categories || ["PUMA COMBO", "PREMIUM COMBO"];
          if (window.updateSubCategoriesFromFirebase) window.updateSubCategoriesFromFirebase(subCats);
        } else {
          const defaultSubCats = ["PUMA COMBO", "PREMIUM COMBO"];
          await setDoc(doc(db, "settings", "storeData"), { subCategories: defaultSubCats });
          if (window.updateSubCategoriesFromFirebase) window.updateSubCategoriesFromFirebase(defaultSubCats);
        }
      } catch (error) {
        console.error("Error fetching settings:", error);
      }
    }

    fetchProducts();
    fetchSettings();

    window.saveSubCategoriesToFirebase = async function(updatedSubCats) {
      try {
        await setDoc(doc(db, "settings", "storeData"), { subCategories: updatedSubCats }, { merge: true });
      } catch(error) {
        console.error("Error saving sub-categories:", error);
      }
    };

    window.deleteProductFromFirebase = async function(productId) {
      try {
        await deleteDoc(doc(db, "products", productId));
      } catch (error) {
        console.error("Delete error:", error);
      }
    };

    window.updateProductInFirebase = async function(productId, newData) {
      try {
        await updateDoc(doc(db, "products", productId), newData);
      } catch (error) {
        console.error("Update error:", error);
        alert("Update nahi ho paya. Internet check karein!");
      }
    };

    document.getElementById("addProductBtn").addEventListener("click", async () => {
      const pName     = document.getElementById("pName").value.trim();
      const pImage    = document.getElementById("pImage").value.trim();
      const pPrice    = document.getElementById("pPrice").value;
      const pDiscount = document.getElementById("pDiscount").value;
      const pExtra    = document.getElementById("pExtra").value;
      const pMainCat  = document.getElementById("pMainCat").value;
      const pSubCat   = document.getElementById("pSubCat").value || "";
      const pInStock  = document.getElementById("pInStock").checked;

      if (!pName || !pImage || !pPrice) {
        alert("Pehle Product ka Naam, Image URL aur Price daalein!");
        return;
      }

      const btn = document.getElementById("addProductBtn");
      btn.textContent = "Saving...";
      try {
        await addDoc(collection(db, "products"), {
          name: pName,
          imageUrl: pImage,
          price: Number(pPrice),
          discount: Number(pDiscount) || 0,
          extra: Number(pExtra) || 0,
          mainCategory: pMainCat,
          subCategory: pSubCat,
          category: pSubCat,
          inStock: pInStock,
          timestamp: new Date()
        });
        alert("Product Live Ho Gaya! 🎉");
        ["pName","pImage","pPrice","pDiscount","pExtra"].forEach(id => document.getElementById(id).value = "");
        fetchProducts();
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        btn.textContent = "Add Product";
      }
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
