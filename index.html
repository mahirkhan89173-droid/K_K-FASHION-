<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KNK Fashion — Online Clothing Store</title>
  <meta name="description" content="Shop t-shirts, shirts, pants and combos online. Easy ordering on WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-glow"></div>
    <div class="splash-oval">
      <div class="splash-brand">KNK</div>
      <div class="splash-sub">FASHION</div>
    </div>
    <div class="splash-line"></div>
    <p class="splash-tagline">Premium Quality</p>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <header class="header">
      <button id="logoBtn" class="logo-btn" aria-label="Store logo">
        <span class="brand-mark">KNK</span>
        <span class="brand-name">Fashion</span>
      </button>
      <button id="cartBtn" class="icon-btn cart-btn" aria-label="Open cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span id="cartCount" class="badge hidden">0</span>
      </button>
    </header>
    <div class="cats-wrap"><div id="cats" class="cats"></div></div>
    <main class="main">
      <h2 id="activeTitle" class="section-title">All</h2>
      <div id="products" class="grid"></div>
    </main>
  </div>

  <!-- Cart drawer -->
  <div id="cartOverlay" class="overlay hidden">
    <div class="drawer">
      <div class="drawer-head">
        <h2>Your Cart</h2>
        <button id="cartClose" class="icon-btn" aria-label="Close cart">✕</button>
      </div>
      <div id="cartItems" class="drawer-body"></div>
      <div id="cartFooter" class="drawer-foot hidden">
        <div class="total"><span>Total</span><span id="cartTotal">₹0</span></div>
        <button id="checkoutBtn" class="btn-primary full">Order on WhatsApp</button>
        <button id="clearCartBtn" class="link">Clear cart</button>
      </div>
    </div>
  </div>

  <!-- Admin PIN -->
  <div id="adminPin" class="overlay center hidden">
    <div class="pin-box">
      <button id="pinClose" class="icon-btn close-abs" aria-label="Close">✕</button>
      <div class="lock">🔒</div>
      <h2>Admin Login</h2>
      <p>Enter PIN to continue</p>
      <input id="pinInput" type="password" inputmode="numeric" placeholder="••••" class="pin-input" />
      <div id="pinError" class="error hidden">Wrong PIN</div>
      <button id="pinUnlock" class="btn-primary full">Unlock</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="admin hidden">
    <div class="admin-inner">
      <div class="drawer-head">
        <h2>Admin Panel</h2>
        <button id="adminClose" class="icon-btn" aria-label="Close admin">✕</button>
      </div>
      <section class="card">
        <h3>Categories</h3>
        <div id="adminCats" class="chips"></div>
        <div class="row">
          <input id="newCat" class="field" placeholder="New category" />
          <button id="addCatBtn" class="btn-primary">+ Add</button>
        </div>
      </section>
      <section class="card">
        <h3>Add Product</h3>
        <input id="pName" class="field" placeholder="Product name" />
        <input id="pImage" class="field" placeholder="Image URL" />
        <div class="row3">
          <input id="pPrice" class="field" type="number" placeholder="Price" />
          <input id="pDiscount" class="field" type="number" placeholder="Discount %" />
          <input id="pExtra" class="field" type="number" placeholder="Extra ₹" />
        </div>
        <select id="pCategory" class="field"></select>
        <button id="addProductBtn" class="btn-primary full">Add Product</button>
      </section>
      <section class="card">
        <h3 id="adminProdTitle">Products</h3>
        <div id="adminProducts"></div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
